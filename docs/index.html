<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MLB Edge</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo" aria-label="MLB Edge">
        <svg class="logo-icon" viewBox="0 0 22 22" width="22" height="22" fill="none" aria-hidden="true">
          <path d="M11 1 L21 11 L11 21 L1 11 Z" stroke="rgba(34,197,94,.70)" stroke-width="1.4" stroke-linejoin="round" fill="rgba(34,197,94,.07)"/>
          <circle cx="11" cy="19.6" r="1.5" fill="rgba(255,255,255,.88)"/>
          <circle cx="19.6" cy="11"  r="1.5" fill="rgba(255,255,255,.88)"/>
          <circle cx="11"   cy="2.4" r="1.5" fill="rgba(255,255,255,.88)"/>
          <circle cx="2.4"  cy="11"  r="1.5" fill="rgba(255,255,255,.88)"/>
          <circle cx="11"   cy="11"  r="1.8" fill="rgba(34,197,94,.80)"/>
        </svg>
        <div class="logo-wordmark">
          <span class="logo-mlb">MLB</span><span class="logo-edge">EDGE</span>
        </div>
      </div>
      <nav class="nav-tabs">
        <button class="nav-btn active" data-view="games">Games</button>
        <button class="nav-btn" data-view="record">Record</button>
        <button class="nav-btn" data-view="backtest">Backtest</button>
      </nav>
    </div>
  </header>

  <main id="app">
    <div id="games-view"></div>
    <div id="record-view" hidden></div>
    <div id="backtest-view" hidden></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
