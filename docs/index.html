<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MLB Edge</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">MLB Edge</div>
      <nav class="nav-tabs">
        <button class="nav-btn active" data-view="games">Games</button>
        <button class="nav-btn" data-view="record">Record</button>
      </nav>
    </div>
  </header>

  <main id="app">
    <div id="games-view"></div>
    <div id="record-view" hidden></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
