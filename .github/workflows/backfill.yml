name: Backfill Historical Data & Calibrate

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Seasons to backfill game data + odds (e.g. 2019,2020,2021,2022,2023,2024)'
        required: false
        default: '2023,2024'
      prior_seasons:
        description: 'Prior seasons needed for lookahead-safe pitcher caches (e.g. 2018,2022,2023)'
        required: false
        default: '2022,2023'
      odds_source:
        description: 'Odds data source: sbro (free, 2019-2021) or odds_api (Professional plan, 2022+)'
        required: false
        default: 'sbro'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull prior-season data (for lookahead-safe pitcher caches)
        if: "${{ github.event.inputs.prior_seasons != '' }}"
        run: python -m pipeline.historical --seasons "${{ github.event.inputs.prior_seasons }}"

      - name: Pull historical season data + closing lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.odds_source }}" = "odds_api" ] && [ -n "$ODDS_API_KEY" ]; then
            EXTRA_ARGS="--api-key $ODDS_API_KEY"
          fi
          python -m pipeline.historical \
            --seasons "${{ github.event.inputs.seasons }}" \
            --with-odds \
            --odds-source "${{ github.event.inputs.odds_source }}" \
            $EXTRA_ARGS

      - name: Run backtest with EV stats
        run: python -m pipeline.backtest --seasons "${{ github.event.inputs.seasons }}"

      - name: Compute calibration
        run: python -m pipeline.recalibrate

      - name: Build comps database
        run: python -m pipeline.comps --build

      - name: Commit calibration and comps results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calibration.json data/game_comps.json docs/backtest.json
          git diff --staged --quiet || git commit -m "chore: update calibration and comps database [skip ci]"
          git pull --rebase origin master
          git push
