name: Backfill History Odds

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print results without writing history.json)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m pipeline.backfill_history_odds --api-key "$ODDS_API_KEY" --dry-run
          else
            python -m pipeline.backfill_history_odds --api-key "$ODDS_API_KEY"
          fi

      - name: Commit updated history
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history.json
          if git diff --staged --quiet; then
            echo "No changes to history.json"
          else
            git commit -m "chore: backfill history.json with Pinnacle closing lines [skip ci]"
            git pull --rebase origin master
            git push
          fi
