name: MLB Morning Games

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min
  workflow_dispatch:

# Prevent two runs from stepping on each other — queue, don't cancel
concurrency:
  group: generate-games
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-games:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if games.json is fresh (< 12 min old)
        id: check
        run: |
          NOW=$(date -u +%s)
          GENERATED=$(python3 -c "
          import json, sys
          from datetime import datetime, timezone
          try:
              d = json.load(open('docs/games.json'))
              ts = datetime.fromisoformat(d['generated_at'].replace('Z', '+00:00'))
              print(int(ts.timestamp()))
          except Exception:
              print(0)
          " 2>/dev/null)
          AGE=$((NOW - GENERATED))
          echo "Games data age: ${AGE}s"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — bypassing freshness check, regenerating."
          elif [ "$AGE" -lt 720 ]; then
            echo "stale=false" >> $GITHUB_OUTPUT
            echo "games.json is ${AGE}s old — still fresh, skipping."
          else
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "games.json is ${AGE}s old — regenerating."
          fi

      - name: Set up Python
        if: steps.check.outputs.stale == 'true'
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.stale == 'true'
        run: pip install -r requirements.txt

      - name: Run game intelligence pipeline
        if: steps.check.outputs.stale == 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m pipeline.main

      - name: Resolve yesterday's predictions
        if: steps.check.outputs.stale == 'true'
        run: python -m pipeline.history --resolve || true

      - name: Backfill 2026 season history (Sundays or manual trigger)
        if: steps.check.outputs.stale == 'true'
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running history backfill..."
            python -m pipeline.backfill || echo "Backfill failed (non-fatal)"
          else
            echo "Not Sunday and not manual trigger — skipping backfill"
          fi

      - name: Refresh backtest (Sundays or manual trigger)
        if: steps.check.outputs.stale == 'true'
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running backtest refresh..."
            python -m pipeline.backtest || echo "Backtest failed (non-fatal)"
          else
            echo "Not Sunday and not manual trigger — skipping backtest"
          fi

      - name: Refit calibration (Mondays or manual trigger)
        if: steps.check.outputs.stale == 'true'
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Refitting calibration from 2026 history..."
            python -m pipeline.recalibrate || echo "Recalibrate failed (non-fatal)"
          else
            echo "Not Monday and not manual trigger — skipping refit"
          fi

      - name: Commit output files
        if: steps.check.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/games.json docs/history.json
          git add docs/backtest.json 2>/dev/null || true
          git add docs/picks.json 2>/dev/null || true
          git add data/calibration.json 2>/dev/null || true
          git add data/opening_lines.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update picks [skip ci]"
          git pull --rebase origin master
          git push
