name: Live Score Updates

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

# Cancel any queued run — always use the freshest score fetch
concurrency:
  group: live-scores
  cancel-in-progress: true

permissions:
  contents: write
  actions: write   # needed for gh workflow run dispatch

jobs:
  patch-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install requests
        run: pip install requests

      - name: Patch live scores and preview fields
        id: patch
        run: python -m pipeline.live_scores

      - name: Commit if scores changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/games.json
          if git diff --staged --quiet; then
            echo "No score changes — nothing to commit"
          else
            git commit -m "chore: live score update [skip ci]"
            git pull --rebase origin master
            git push
          fi

      - name: Trigger full rebuild if pitcher/lineup changed
        if: steps.patch.outputs.needs_rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pitcher or lineup change detected — dispatching full pipeline rebuild"
          gh workflow run morning_picks.yml --ref master
